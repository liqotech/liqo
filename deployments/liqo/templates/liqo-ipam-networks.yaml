{{- $ipamConfig := (merge (dict "name" "ipam" "module" "ipam") .) -}}
{{- if .Values.ipam.podCIDRs }}
{{- range $cidr := .Values.ipam.podCIDRs }}
---
apiVersion: ipam.liqo.io/v1alpha1
kind: Network
metadata:
  name: pod-cidr-{{ $cidr | replace "/" "-" | replace "." "-" }}
  labels:
    {{- include "liqo.labels" $ipamConfig | nindent 4 }}
    ipam.liqo.io/network-type: pod-cidr
    ipam.liqo.io/network-not-remapped: "true"
  annotations:
    liqo.io/preinstalled: "true"
spec:
  cidr: {{ $cidr }}
{{- end }}
{{- else if .Values.ipam.podCIDR }}
---
apiVersion: ipam.liqo.io/v1alpha1
kind: Network
metadata:
  name: pod-cidr
  labels:
    {{- include "liqo.labels" $ipamConfig | nindent 4 }}
    ipam.liqo.io/network-type: pod-cidr
    ipam.liqo.io/network-not-remapped: "true"
  annotations:
    liqo.io/preinstalled: "true"
spec:
  cidr: {{ .Values.ipam.podCIDR }}
{{- end }}
---
apiVersion: ipam.liqo.io/v1alpha1
kind: Network
metadata:
  name: service-cidr
  labels:
    {{- include "liqo.labels" $ipamConfig | nindent 4 }}
    ipam.liqo.io/network-type: service-cidr
    ipam.liqo.io/network-not-remapped: "true"
  annotations:
    liqo.io/preinstalled: "true"
spec:
  cidr: {{ .Values.ipam.serviceCIDR }}
{{- if .Values.ipam.externalCIDRs }}
{{- range $cidr := .Values.ipam.externalCIDRs }}
---
apiVersion: ipam.liqo.io/v1alpha1
kind: Network
metadata:
  name: external-cidr-{{ $cidr | replace "/" "-" | replace "." "-" }}
  labels:
    {{- include "liqo.labels" $ipamConfig | nindent 4 }}
    ipam.liqo.io/network-type: external-cidr
  annotations:
    liqo.io/preinstalled: "true"
spec:
  cidr: {{ $cidr }}
  preAllocated: 1 # the first IP of the external CIDR is reserved for the unknown source traffic
{{- end }}
{{- else if .Values.ipam.externalCIDR }}
---
apiVersion: ipam.liqo.io/v1alpha1
kind: Network
metadata:
  name: external-cidr
  labels:
    {{- include "liqo.labels" $ipamConfig | nindent 4 }}
    ipam.liqo.io/network-type: external-cidr
  annotations:
    liqo.io/preinstalled: "true"
spec:
  cidr: {{ .Values.ipam.externalCIDR }}
  preAllocated: 1 # the first IP of the external CIDR is reserved for the unknown source traffic
{{- end }}
---
apiVersion: ipam.liqo.io/v1alpha1
kind: Network
metadata:
  name: internal-cidr
  labels:
    {{- include "liqo.labels" $ipamConfig | nindent 4 }}
    ipam.liqo.io/network-type: internal-cidr
  annotations:
    liqo.io/preinstalled: "true"
spec:
  cidr: {{ .Values.ipam.internalCIDR }}
---
{{- range $i, $value := .Values.ipam.reservedSubnets }}
apiVersion: ipam.liqo.io/v1alpha1
kind: Network
metadata:
  name: reserved-{{ add $i 1 }}
  labels:
    {{- include "liqo.labels" $ipamConfig | nindent 4 }}
    ipam.liqo.io/network-type: reserved
    ipam.liqo.io/network-not-remapped: "true"
  annotations:
    liqo.io/preinstalled: "true"
spec:
  cidr: {{ $value }}
---
{{- end }}
